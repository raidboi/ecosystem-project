<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ecosystem Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f4f0;
  color: #1a1a18;
  min-height: 100vh;
  padding: 2rem 1rem;
}
#app {
  max-width: 760px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e0dfd8;
  padding: 2rem;
}
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

.game-title { font-size: 24px; font-weight: 600; color: #1a1a18; }
.game-sub { font-size: 14px; color: #6b6b68; margin-top: 4px; margin-bottom: 1.5rem; }

.stats-row { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat-card { background: #f5f4f0; border-radius: 8px; padding: 0.75rem 1rem; min-width: 100px; }
.stat-label { font-size: 12px; color: #6b6b68; }
.stat-val { font-size: 20px; font-weight: 600; color: #1a1a18; margin-top: 2px; }

.round-label { font-size: 13px; font-weight: 600; color: #6b6b68; margin-bottom: 0.75rem; }
.instructions { font-size: 13px; color: #6b6b68; margin-bottom: 1rem; padding: 0.75rem 1rem; border: 1px solid #e0dfd8; border-radius: 8px; background: #f5f4f0; }
.instructions b { color: #1a1a18; }

.card-pool-label { font-size: 12px; color: #6b6b68; margin-bottom: 0.5rem; }
.card-pool { display: flex; flex-wrap: wrap; gap: 10px; min-height: 60px; margin-bottom: 1.5rem; padding: 12px; border: 2px dashed #c8c7c0; border-radius: 12px; }

.org-card {
  cursor: grab;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #c8c7c0;
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  color: #1a1a18;
  user-select: none;
  transition: transform 0.12s, opacity 0.12s;
  display: flex; align-items: center; gap: 6px;
}
.org-card:active { cursor: grabbing; transform: scale(1.04); }
.org-card.dragging { opacity: 0.4; }
.org-card.placed { display: none; }

.zones { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }

.zone {
  border-radius: 12px;
  border: 1.5px solid #e0dfd8;
  background: #fff;
  padding: 12px;
  min-height: 140px;
  transition: border-color 0.15s, background 0.15s;
}
.zone.over { border-color: #378add; background: #e6f1fb; }
.zone-title { font-size: 13px; font-weight: 600; color: #1a1a18; margin-bottom: 4px; }
.zone-hint { font-size: 11px; color: #6b6b68; margin-bottom: 10px; }
.zone-contents { display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; }

.zone-card {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.zone-card.correct { background: #eaf3de; color: #3b6d11; border: 1px solid #97c459; }
.zone-card.wrong { background: #fcebeb; color: #a32d2d; border: 1px solid #f09595; animation: shake 0.35s; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.feedback-bar {
  min-height: 48px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 1rem;
  border: 1px solid #e0dfd8;
  background: #f5f4f0;
  color: #6b6b68;
  transition: all 0.2s;
  line-height: 1.5;
}
.feedback-bar.success-fb { background: #eaf3de; border-color: #97c459; color: #3b6d11; }
.feedback-bar.error-fb { background: #fcebeb; border-color: #f09595; color: #a32d2d; }

.btn {
  padding: 9px 22px;
  border-radius: 8px;
  border: 1px solid #c8c7c0;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #1a1a18;
  transition: background 0.1s, transform 0.1s;
}
.btn:hover { background: #f5f4f0; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #e6f1fb; color: #185fa5; border-color: #85b7eb; }
.btn-primary:hover { background: #b5d4f4; }

.complete-screen { text-align: center; padding: 2rem 1rem; }
.complete-icon { font-size: 56px; margin-bottom: 1rem; }
.complete-title { font-size: 24px; font-weight: 600; margin-bottom: 0.5rem; }
.complete-sub { font-size: 14px; color: #6b6b68; margin-bottom: 1rem; }
.score-big { font-size: 56px; font-weight: 700; color: #185fa5; }
.score-meta { font-size: 13px; color: #6b6b68; margin: 0.5rem 0 1.5rem; }
</style>
</head>
<body>
<div id="app">
  <h1 class="sr-only">Ecosystem Explorer — drag organisms into their correct ecological category</h1>
  <div id="game"></div>
</div>

<script>
const ROUNDS = [
  {
    title: "Round 1 — Sort by Biome",
    instructions: "<b>Drag</b> each organism card into its home biome. Each organism belongs to exactly one zone.",
    zones: [
      { id: "rainforest", label: "🌿 Tropical Rainforest", hint: "Warm, wet, dense canopy" },
      { id: "grassland",  label: "🌾 Temperate Grassland",  hint: "Open plains, seasonal rain" },
      { id: "ocean",      label: "🌊 Deep Ocean",            hint: "Cold, dark, high pressure" },
    ],
    cards: [
      { id: "jaguar",       label: "🐆 Jaguar",        correct: "rainforest", feedback: { right: "Correct! Jaguars are apex predators of tropical rainforests, regulating prey populations.", wrong: "Jaguars live in tropical rainforests — they need dense cover to hunt." } },
      { id: "toucan",       label: "🦜 Toucan",        correct: "rainforest", feedback: { right: "Right! Toucans disperse seeds across the rainforest canopy, aiding forest regeneration.", wrong: "Toucans are canopy birds found in tropical rainforests." } },
      { id: "bison",        label: "🦬 Bison",         correct: "grassland",  feedback: { right: "Correct! Bison are keystone grazers of temperate grasslands, shaping vegetation structure.", wrong: "Bison roam temperate grasslands — they need open space to graze." } },
      { id: "prairie_dog",  label: "🐾 Prairie Dog",   correct: "grassland",  feedback: { right: "Right! Prairie dogs engineer grassland ecosystems with burrow networks used by many species.", wrong: "Prairie dogs are grassland engineers — they build burrow systems in open plains." } },
      { id: "anglerfish",   label: "🐟 Anglerfish",    correct: "ocean",      feedback: { right: "Correct! Anglerfish adapted to the deep ocean's darkness with a bioluminescent lure.", wrong: "Anglerfish live in the deep ocean where bioluminescence is their only light source." } },
      { id: "giant_squid",  label: "🦑 Giant Squid",   correct: "ocean",      feedback: { right: "Right! Giant squid are deep-ocean predators and key prey for sperm whales.", wrong: "Giant squid inhabit the deep ocean — they can't survive in surface conditions." } },
    ]
  },
  {
    title: "Round 2 — Sort by Trophic Level",
    instructions: "<b>Drag</b> each organism to its correct position in the food chain.",
    zones: [
      { id: "producer",  label: "🌱 Producer",           hint: "Makes its own energy via photosynthesis" },
      { id: "primary",   label: "🐛 Primary Consumer",   hint: "Eats producers directly" },
      { id: "secondary", label: "🦅 Secondary Consumer", hint: "Eats primary consumers" },
    ],
    cards: [
      { id: "oak",           label: "🌳 Oak Tree",          correct: "producer",  feedback: { right: "Correct! Oak trees photosynthesize, forming the base of many temperate food webs.", wrong: "Oak trees are producers — they create energy from sunlight, not by eating other organisms." } },
      { id: "phytoplankton", label: "🟢 Phytoplankton",     correct: "producer",  feedback: { right: "Right! Phytoplankton produce around 50% of Earth's oxygen through photosynthesis.", wrong: "Phytoplankton are producers — microscopic plants that photosynthesize in oceans." } },
      { id: "rabbit",        label: "🐇 Rabbit",            correct: "primary",   feedback: { right: "Correct! Rabbits eat plants directly, making them primary consumers.", wrong: "Rabbits eat plants — they are primary consumers, not producers or predators." } },
      { id: "zooplankton",   label: "🔵 Zooplankton",       correct: "primary",   feedback: { right: "Right! Zooplankton graze on phytoplankton, transferring energy up the marine food web.", wrong: "Zooplankton eat phytoplankton — they are primary consumers in aquatic ecosystems." } },
      { id: "hawk",          label: "🦅 Red-tailed Hawk",   correct: "secondary", feedback: { right: "Correct! Hawks hunt rabbits and rodents, placing them at the secondary consumer level.", wrong: "Hawks eat primary consumers like rabbits and rodents — they are secondary consumers." } },
      { id: "tuna",          label: "🐠 Tuna",              correct: "secondary", feedback: { right: "Right! Tuna prey on smaller fish and zooplankton, acting as secondary consumers.", wrong: "Tuna eat smaller fish and zooplankton — they are secondary consumers in the ocean food web." } },
    ]
  },
  {
    title: "Round 3 — Keystone, Invasive & Decomposers",
    instructions: "Some species have outsized ecological effects. <b>Sort</b> each organism by its role.",
    zones: [
      { id: "keystone",    label: "🔑 Keystone Species", hint: "Disproportionately important to ecosystem structure" },
      { id: "invasive",    label: "⚠️ Invasive Species",  hint: "Non-native species causing ecological harm" },
      { id: "decomposer",  label: "🍄 Decomposer",        hint: "Breaks down dead organic matter, recycling nutrients" },
    ],
    cards: [
      { id: "wolf",       label: "🐺 Gray Wolf",      correct: "keystone",   feedback: { right: "Correct! Gray wolves are a classic keystone species — their Yellowstone reintroduction triggered a trophic cascade that restored riverbanks and forests.", wrong: "Gray wolves are keystone species. Their presence controls herbivore populations and reshapes landscapes through trophic cascades." } },
      { id: "sea_otter",  label: "🦦 Sea Otter",      correct: "keystone",   feedback: { right: "Right! Sea otters control sea urchin populations, protecting kelp forests that shelter hundreds of species.", wrong: "Sea otters are keystone species — without them, sea urchins overgraze kelp forests, collapsing entire marine ecosystems." } },
      { id: "cane_toad",  label: "🐸 Cane Toad",      correct: "invasive",   feedback: { right: "Correct! Introduced to Australia in 1935, cane toads devastated native predator populations with their toxic skin.", wrong: "Cane toads are invasive in Australia — deliberately introduced, they've caused massive declines in native wildlife." } },
      { id: "kudzu",      label: "🌿 Kudzu Vine",      correct: "invasive",   feedback: { right: "Right! Kudzu, introduced from Asia, smothers native vegetation across the southeastern US and is called 'the vine that ate the South.'", wrong: "Kudzu is an invasive plant from Asia that overtakes native vegetation in the southeastern United States." } },
      { id: "fungi",      label: "🍄 Forest Fungi",    correct: "decomposer", feedback: { right: "Correct! Fungi decompose dead wood and leaf litter, cycling nutrients back into the soil.", wrong: "Forest fungi are decomposers — they break down dead organic matter and return nutrients to the ecosystem." } },
      { id: "earthworm",  label: "🪱 Earthworm",       correct: "decomposer", feedback: { right: "Right! Earthworms decompose organic matter and aerate soil, making them critical ecosystem engineers.", wrong: "Earthworms are decomposers that break down organic matter and improve soil structure." } },
    ]
  }
];

let state = { round: 0, score: 0, correct: 0, total: 0, placedCards: {}, results: {}, feedback: "", feedbackType: "", done: false };
let dragging = null;

function r() { return ROUNDS[state.round]; }

function render() {
  const el = document.getElementById("game");
  if (state.done) { el.innerHTML = renderComplete(); bindComplete(); return; }
  const round = r();
  el.innerHTML = `
    <div class="game-title">🌍 Ecosystem Explorer</div>
    <div class="game-sub">Drag organisms into their correct ecological category</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val">${state.score}</div></div>
      <div class="stat-card"><div class="stat-label">Correct</div><div class="stat-val">${state.correct} / ${state.total}</div></div>
      <div class="stat-card"><div class="stat-label">Round</div><div class="stat-val">${state.round + 1} / ${ROUNDS.length}</div></div>
    </div>
    <div class="round-label">${round.title}</div>
    <div class="instructions">${round.instructions}</div>
    <div class="card-pool-label">Organisms to place</div>
    <div class="card-pool">${round.cards.map(c => `<div class="org-card${state.placedCards[c.id] ? ' placed' : ''}" draggable="true" data-id="${c.id}">${c.label}</div>`).join("")}</div>
    <div class="zones">${round.zones.map(z => `
      <div class="zone" data-zone="${z.id}">
        <div class="zone-title">${z.label}</div>
        <div class="zone-hint">${z.hint}</div>
        <div class="zone-contents">${round.cards.filter(c => state.placedCards[c.id] === z.id).map(c => {
          const res = state.results[c.id];
          return `<span class="zone-card ${res}">${c.label} ${res === 'correct' ? '✓' : '✗'}</span>`;
        }).join("")}</div>
      </div>`).join("")}
    </div>
    <div class="feedback-bar ${state.feedbackType}">${state.feedback || "Drop an organism into a zone to begin."}</div>
    ${round.cards.every(c => state.placedCards[c.id]) ? `<div style="text-align:right;margin-top:0.5rem"><button class="btn btn-primary" id="next-btn">${state.round < ROUNDS.length - 1 ? "Next Round →" : "See Results →"}</button></div>` : ""}
  `;
  bindEvents(round);
}

function bindEvents(round) {
  document.querySelectorAll(".org-card:not(.placed)").forEach(card => {
    card.addEventListener("dragstart", e => { dragging = e.currentTarget.dataset.id; setTimeout(() => e.currentTarget.classList.add("dragging"), 0); });
    card.addEventListener("dragend", e => { e.currentTarget.classList.remove("dragging"); dragging = null; });
  });
  document.querySelectorAll(".zone").forEach(zone => {
    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("over"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("over"));
    zone.addEventListener("drop", e => {
      e.preventDefault(); zone.classList.remove("over");
      if (!dragging) return;
      const card = round.cards.find(c => c.id === dragging);
      if (!card || state.placedCards[card.id]) return;
      const zoneId = zone.dataset.zone;
      state.placedCards[card.id] = zoneId;
      const ok = card.correct === zoneId;
      state.results[card.id] = ok ? "correct" : "wrong";
      state.total++;
      if (ok) { state.correct++; state.score += 100; state.feedback = "✓ " + card.feedback.right; state.feedbackType = "success-fb"; }
      else { state.score = Math.max(0, state.score - 20); state.feedback = "✗ " + card.feedback.wrong; state.feedbackType = "error-fb"; }
      dragging = null; render();
    });
  });
  const nb = document.getElementById("next-btn");
  if (nb) nb.addEventListener("click", () => {
    if (state.round < ROUNDS.length - 1) { state.round++; state.placedCards = {}; state.results = {}; state.feedback = ""; state.feedbackType = ""; render(); }
    else { state.done = true; render(); }
  });
}

function renderComplete() {
  const pct = Math.round((state.correct / state.total) * 100);
  const grade = pct >= 90 ? "Ecology expert! 🎓" : pct >= 70 ? "Strong understanding! 📚" : pct >= 50 ? "Good effort — keep studying!" : "Keep at it — ecosystems are complex!";
  return `<div class="complete-screen">
    <div class="complete-icon">🌍</div>
    <div class="complete-title">Ecosystem Explorer Complete!</div>
    <div class="complete-sub">${grade}</div>
    <div class="score-big">${state.score}</div>
    <div class="score-meta">${state.correct} / ${state.total} correct &nbsp;·&nbsp; ${pct}%</div>
    <button class="btn btn-primary" id="restart-btn">Play Again</button>
  </div>`;
}

function bindComplete() {
  document.getElementById("restart-btn").addEventListener("click", () => {
    state = { round: 0, score: 0, correct: 0, total: 0, placedCards: {}, results: {}, feedback: "", feedbackType: "", done: false };
    render();
  });
}

render();
</script>
</body>
</html>
